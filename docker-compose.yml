services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    environment:
      REDIS_QUEUE_KEY: ai-task-jobs
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mongo-data:
