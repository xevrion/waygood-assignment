apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: waygood-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: docker.io/example/waygood-worker:latest
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "print('ok')"]
            initialDelaySeconds: 20
          readinessProbe:
            exec:
              command: ["python", "-c", "print('ready')"]
            initialDelaySeconds: 10

