apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: waygood-ai-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/waygood-infra.git
    targetRevision: main
    path: overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: waygood-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

